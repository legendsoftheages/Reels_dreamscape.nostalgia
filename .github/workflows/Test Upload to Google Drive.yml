name: Diagnose Service Account Issue

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check service account secret
        env:
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
        run: |
          echo "=== Secret length ==="
          echo "$GDRIVE_SERVICE_ACCOUNT" | wc -c
          
          echo ""
          echo "=== First 200 characters ==="
          echo "$GDRIVE_SERVICE_ACCOUNT" | head -c 200
          
          echo ""
          echo "=== Checking if valid JSON ==="
          echo "$GDRIVE_SERVICE_ACCOUNT" | python3 -m json.tool > /tmp/check.json 2>&1 && echo "✅ Valid JSON" || echo "❌ Invalid JSON - see error below:"
          cat /tmp/check.json
          
          echo ""
          echo "=== Looking for private_key field ==="
          echo "$GDRIVE_SERVICE_ACCOUNT" | grep -o '"private_key"' | head -1 && echo "✅ private_key field found" || echo "❌ private_key field not found"
