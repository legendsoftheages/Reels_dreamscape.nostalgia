name: Upload to Google Drive

on:
  push:
    branches:
      - main

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydrive2

      - name: Save Service Account JSON
        run: |
          mkdir -p $HOME/.secrets
          printf "%s" "${{ secrets.GDRIVE_SERVICE_ACCOUNT }}" > $HOME/.secrets/service_account.json

      - name: Upload spotify.png to Google Drive
        env:
          SERVICE_ACCOUNT_FILE: $HOME/.secrets/service_account.json
        run: |
          python - <<EOF
          from pydrive2.auth import GoogleAuth
          from pydrive2.drive import GoogleDrive
          import os

          SERVICE_ACCOUNT_FILE = os.environ["SERVICE_ACCOUNT_FILE"]

          gauth = GoogleAuth()
          gauth.LoadServiceAccountCredentialsFile(SERVICE_ACCOUNT_FILE)  # correct method
          drive = GoogleDrive(gauth)

          file = drive.CreateFile({'title': 'spotify.png'})
          file.SetContentFile('spotify.png')
          file.Upload()
          print("✅ Uploaded successfully!")
          EOF
